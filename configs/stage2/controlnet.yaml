model:
  base_model: runwayml/stable-diffusion-v1-5
  controlnet_model: lllyasviel/sd-controlnet-canny
  lora_dir: checkpoints/stage2/lora

paths:
  input_dir: outputs/samples/stage2_refined
  output_dir: outputs/samples/stage2_controlnet

infer:
  enabled: true
  resolution: 512
  canny_low: 80
  canny_high: 180
  strength: 0.3
  control_scale: 0.85
  guidance_scale: 7.0
  num_steps: 50
  prompt: "ultra detailed lace textile, intricate threads, perforated pattern, seamless texture"
  negative_prompt: "blurry, over-smoothed, plastic, artifacts, watermark, text"
