model:
  base_model: runwayml/stable-diffusion-v1-5

data:
  image_dir: data/processed/train
  image_column: file_name
  caption_column: text

train:
  resolution: 512
  batch_size: 2
  learning_rate: 0.0001
  max_steps: 10000
  checkpoint_every: 500
  lora_rank: 16
  mixed_precision: fp16
  validation_prompt: "ultra detailed lace textile, macro photo, seamless texture"

paths:
  output_dir: checkpoints/stage2/lora
